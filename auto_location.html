<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحديد الموقع...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .sub-status {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 20px;
        }
        
        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .location-link {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-size: 12px;
            color: #495057;
            direction: ltr;
            text-align: left;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin: 10px 5px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }

        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .coords-display {
            background: #d4edda;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 16px;
            font-weight: bold;
            color: #155724;
            direction: ltr;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <div class="status">جاري تحديد موقعك...</div>
            <div class="sub-status">الرجاء السماح بالوصول للموقع</div>
        </div>
        
        <div id="success" style="display: none;">
            <div class="success-icon">✅</div>
            <div class="status">تم تحديد الموقع بنجاح!</div>
            
            <div class="coords-display" id="coordsDisplay"></div>
            
            <div class="location-link" id="locationLink"></div>
            
            <button class="btn" onclick="copyLink()">📋 نسخ اللينك</button>
            <button class="btn btn-secondary" onclick="getLocation()">🔄 تحديث الموقع</button>
        </div>
        
        <div id="error" style="display: none;">
            <div class="success-icon">❌</div>
            <div class="status">حدث خطأ</div>
            <div class="error-box" id="errorMessage"></div>
            <button class="btn btn-secondary" onclick="getLocation()">🔄 حاول مرة أخرى</button>
        </div>
    </div>

    <script>
        let currentLink = '';

        // بدء الحصول على الموقع فور فتح الصفحة
        window.onload = function() {
            getLocation();
        };

        function getLocation() {
            // إخفاء كل الأقسام وإظهار Loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('success').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            if (!navigator.geolocation) {
                showError('المتصفح لا يدعم تحديد الموقع');
                return;
            }

            // إعدادات للحصول على أعلى دقة ممكنة
            const options = {
                enableHighAccuracy: true,  // استخدام GPS بدقة عالية
                timeout: 15000,            // 15 ثانية timeout
                maximumAge: 0              // عدم استخدام موقع قديم محفوظ
            };

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    
                    // إنشاء لينك Google Maps
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    currentLink = mapsLink;
                    
                    // عرض النتيجة
                    document.getElementById('coordsDisplay').textContent = 
                        `${lat.toFixed(8)}, ${lng.toFixed(8)}`;
                    
                    document.getElementById('locationLink').textContent = mapsLink;
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('success').style.display = 'block';
                    
                    // نسخ اللينك تلقائيًا
                    copyToClipboard(mapsLink);
                },
                function(error) {
                    let errorMsg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'تم رفض الإذن. الرجاء السماح بالوصول للموقع من إعدادات المتصفح.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'معلومات الموقع غير متاحة. تأكد من تفعيل GPS.';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'انتهت مهلة الطلب. تأكد من الاتصال بالإنترنت و GPS.';
                            break;
                        default:
                            errorMsg = 'حدث خطأ غير معروف.';
                    }
                    showError(errorMsg);
                },
                options
            );
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        function copyLink() {
            if (currentLink) {
                copyToClipboard(currentLink);
            }
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('✅ تم نسخ اللينك بنجاح!');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                alert('✅ تم نسخ اللينك بنجاح!');
            } catch (err) {
                alert('⚠️ لم يتم النسخ. انسخ اللينك يدويًا.');
            }
            
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
