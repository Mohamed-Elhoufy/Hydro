<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحديد الموقع...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .sub-status {
            font-size: 14px;
            color: #6c757d;
        }

        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <div class="status">جاري تحديد موقعك...</div>
            <div class="sub-status">الرجاء السماح بالوصول للموقع<br>ثم الانتظار قليلاً</div>
        </div>
        
        <div id="error" style="display: none;">
            <div style="font-size: 60px; margin-bottom: 20px;">❌</div>
            <div class="status">حدث خطأ</div>
            <div class="error-box" id="errorMessage"></div>
            <button class="btn" onclick="location.reload()">🔄 حاول مرة أخرى</button>
        </div>
    </div>

    <script>
        // ========================================
        // ضع هنا معلومات Google Form الخاص بك
        // ========================================
        
        // لينك الفورم الأساسي (نسخه من المتصفح)
        const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSceQG8YNNURsfxMkEYPKjSpxHKTkAGrbttYwSdW6o2jO_vXoA/viewform?usp=header';
        
        // Entry ID للحقل اللي عايز تملاه (هتلاقيه في inspect element)
        // مثال: entry.123456789
        const LOCATION_FIELD_ENTRY = 'entry.1722461871';
        
        // ========================================

        window.onload = function() {
            getLocation();
        };

        function getLocation() {
            if (!navigator.geolocation) {
                showError('المتصفح لا يدعم تحديد الموقع');
                return;
            }

            const options = {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lat = position.coords.latitude.toFixed(8);
                    const lng = position.coords.longitude.toFixed(8);
                    
                    // إنشاء لينك Google Maps
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    // إنشاء لينك الفورم المملوء مسبقاً
                    const prefilledFormUrl = `${FORM_URL}?${LOCATION_FIELD_ENTRY}=${encodeURIComponent(mapsLink)}`;
                    
                    // الانتقال تلقائياً للفورم المملوء
                    window.location.href = prefilledFormUrl;
                },
                function(error) {
                    let errorMsg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'تم رفض الإذن بالوصول للموقع.\n\nللسماح بالوصول:\n١. اضغط على أيقونة القفل 🔒 بجوار عنوان الصفحة\n٢. اختر "السماح" للموقع\n٣. أعد تحميل الصفحة';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'معلومات الموقع غير متاحة.\n\nتأكد من:\n١. تفعيل GPS في الموبايل\n٢. وجود اتصال بالإنترنت';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'انتهت مهلة الطلب.\n\nجرب:\n١. الوقوف في مكان مفتوح\n٢. إعادة المحاولة';
                            break;
                        default:
                            errorMsg = 'حدث خطأ غير معروف';
                    }
                    showError(errorMsg);
                }
                options
            );
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.whiteSpace = 'pre-line';
        }
    </script>
</body>
</html>
