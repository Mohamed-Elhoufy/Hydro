<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل قياسات الشبكة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {font-family: Arial; background:#667eea; padding:20px;}
.container {max-width:600px;margin:auto;}
.card {background:#fff;padding:20px;border-radius:15px;margin-bottom:15px;}
.btn {padding:10px;border:none;border-radius:8px;cursor:pointer;}
.location-item {padding:10px;border:1px solid #ccc;margin-bottom:10px;cursor:pointer;}
.selected {background:#e7f0ff;}
#map {height:300px;margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<button onclick="show('saved')">📋 المواقع</button>
<button onclick="show('gps')">📍 GPS</button>
<button onclick="show('map')">🗺️ خريطة</button>
</div>

<div id="saved" class="card" style="display:none;">
<div id="list">جاري التحميل...</div>
</div>

<div id="gps" class="card" style="display:none;">
<button onclick="getGPS()">تحديد الموقع</button>
<div id="gpsResult"></div>
<input id="gpsName" placeholder="اسم (اختياري)">
<button onclick="openForm('gps')">تسجيل</button>
</div>

<div id="map" class="card" style="display:none;">
<div id="mapid"></div>
<input id="mapName" placeholder="اسم (اختياري)">
<button onclick="openForm('map')">تسجيل</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// CONFIG
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRVj648OXVdiG_IMMga925QI843xQnOlmrwCwcIC9bIgfiRs59OQZM2MoTjwYjJ3ce5wDD8uOh0vMOF/pub?output=csv';
const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSceQG8YNNURsfxMkEYPKjSpxHKTkAGrbttYwSdW6o2jO_vXoA/viewform?usp=publish-editor';
const FORM_LOCATION_FIELD = 'entry.1722461871';
const FORM_NAME_FIELD = 'entry.103117482';
const FORM_ASSET_FIELD = 'entry.880995171';

// STATE
let locations = [];
let gpsCoords=null;
let mapCoords=null;
let map, marker;
let selectedIndex=null;

// LOAD CSV
async function loadCSV(){
let res = await fetch(CSV_URL);
let text = await res.text();

let lines = text.split('\n');
let headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));

for(let i=1;i<lines.length;i++){
if(!lines[i]) continue;

let values = lines[i].split(',').map(v=>v.trim().replace(/"/g,''));
let obj={};

headers.forEach((h,idx)=> obj[h]=values[idx]);

if(obj.Lat && obj.Long) locations.push(obj);
}

render();
}

// RENDER
function render(){
let html='';
locations.forEach((l,i)=>{
html+=`
<div class="location-item" onclick="select(${i})">
<b>عداية - ${l.VILLAGE_NA || ''}</b><br>
${l.Lat}, ${l.Long}
</div>`;
});
document.getElementById('list').innerHTML=html;
}

// SELECT
function select(i){
selectedIndex=i;
document.querySelectorAll('.location-item').forEach(e=>e.classList.remove('selected'));
document.querySelectorAll('.location-item')[i].classList.add('selected');
}

// GPS
function getGPS(){
navigator.geolocation.getCurrentPosition(p=>{
gpsCoords={lat:p.coords.latitude,lng:p.coords.longitude};
document.getElementById('gpsResult').innerHTML=`${gpsCoords.lat}, ${gpsCoords.lng}`;
});
}

// MAP
function initMap(){
if(map) return;
map=L.map('mapid').setView([31.04,31.37],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

marker=L.marker([31.04,31.37],{draggable:true}).addTo(map);

map.on('click',e=>{
marker.setLatLng(e.latlng);
mapCoords=e.latlng;
});

marker.on('dragend',e=>{
mapCoords=e.target.getLatLng();
});
}

// OPEN FORM
function openForm(type){
let lat,lng,name='',asset='';

if(type==='saved'){
let l=locations[selectedIndex];
lat=l.Lat; lng=l.Long;
name=l.VILLAGE_NA||'';
asset=l.ID||'';
}
else if(type==='gps'){
lat=gpsCoords.lat; lng=gpsCoords.lng;
name=document.getElementById('gpsName').value||'';
}
else{
lat=mapCoords.lat; lng=mapCoords.lng;
name=document.getElementById('mapName').value||'';
}

let link=`https://www.google.com/maps?q=${lat},${lng}`;

let url = `${FORM_URL}?${FORM_LOCATION_FIELD}=${encodeURIComponent(link)}`
+ `&${FORM_NAME_FIELD}=${encodeURIComponent(name)}`
+ `&${FORM_ASSET_FIELD}=${encodeURIComponent(asset)}`;

window.open(url,'_blank');
}

// NAV
function show(s){
document.getElementById('saved').style.display='none';
document.getElementById('gps').style.display='none';
document.getElementById('map').style.display='none';

if(s==='saved') document.getElementById('saved').style.display='block';
if(s==='gps') document.getElementById('gps').style.display='block';
if(s==='map'){document.getElementById('map').style.display='block';initMap();}

if(locations.length===0) loadCSV();
}

</script>
</body>
</html>
